<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWSMS - Register New Household</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-small"></div>
            <span class="sidebar-brand">CWSMS</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="#" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="register_household.html" class="nav-item active">
                <span class="nav-icon">👤</span>
                <span class="nav-text">Register Household</span>
            </a>
            <a href="manage_household.html" class="nav-item">
                <span class="nav-icon">👥</span>
                <span class="nav-text">Manage Households</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">💳</span>
                <span class="nav-text">Recent Payment</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📄</span>
                <span class="nav-text">View Payments</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Audit Reports</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📈</span>
                <span class="nav-text">Reports</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🔔</span>
                <span class="nav-text">Notifications</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">💾</span>
                <span class="nav-text">Backup Data</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🚪</span>
                <span class="nav-text">Logout</span>
            </a>
        </nav>
    </div>

    <div class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="logo"></div>
                <span class="header-title">Community Water Supply Management System</span>
            </div>
            <div class="header-right">
                <span class="header-date">January 25, 2026</span>
                <button class="icon-button">📍</button>
                <button class="icon-button notification-btn">
                    🔔
                    <span class="notification-badge">4</span>
                </button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="page-header">
                <h1 class="page-title">Register New Household</h1>
                <p class="page-subtitle">Add a new resident to the system</p>
            </div>

            <div class="form-card">
                <div id="successMessage" class="success-message"></div>
                <div id="errorMessage" class="error-message"></div>

                <form id="registerHouseholdForm">
                    <div class="form-row">
                        <div class="form-column">
                            <div class="form-group">
                                <label for="householdName" class="form-label">
                                    <span class="label-icon">🏠</span>
                                    Household Name
                                </label>
                                <input 
                                    type="text" 
                                    id="householdName" 
                                    name="householdName" 
                                    class="form-input" 
                                    placeholder="Household Name"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="address" class="form-label">
                                    <span class="label-icon">📍</span>
                                    Address
                                </label>
                                <input 
                                    type="text" 
                                    id="address" 
                                    name="address" 
                                    class="form-input" 
                                    placeholder="Address"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="contactNumber" class="form-label">
                                    <span class="label-icon">📞</span>
                                    Contact Number
                                </label>
                                <input 
                                    type="tel" 
                                    id="contactNumber" 
                                    name="contactNumber" 
                                    class="form-input" 
                                    placeholder="541-537-5555"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-column">
                            <div class="form-group">
                                <label for="username" class="form-label">
                                    <span class="label-icon">👤</span>
                                    Username
                                </label>
                                <input 
                                    type="text" 
                                    id="username" 
                                    name="username" 
                                    class="form-input" 
                                    placeholder="Username"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="password" class="form-label">
                                    <span class="label-icon">🔒</span>
                                    Password
                                </label>
                                <div class="input-wrapper">
                                    <input 
                                        type="password" 
                                        id="password" 
                                        name="password" 
                                        class="form-input" 
                                        placeholder="Password"
                                        required
                                    >
                                    <button type="button" class="toggle-password" data-target="password">👁️</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword" class="form-label">
                                    <span class="label-icon">🔒</span>
                                    Confirm Password
                                </label>
                                <div class="input-wrapper">
                                    <input 
                                        type="password" 
                                        id="confirmPassword" 
                                        name="confirmPassword" 
                                        class="form-input" 
                                        placeholder="Confirm Password"
                                        required
                                    >
                                    <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Register Household</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="wave-background"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
